<!DOCTYPE html>
<html lang="en">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CredenceHub - Real Estate Investment Platform</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}" />

</head>
<body data-theme="light" style="background:var(--bg-primary);">
